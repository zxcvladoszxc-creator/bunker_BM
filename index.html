<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bunker Elite: The End</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --red: #ff4757; --dark: #0a0a0c; --card: #16161a; --green: #2ecc71; --gray: #57606f; --gold: #f1c40f; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--dark); color: #fff; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        h1 { color: var(--red); text-align: center; font-size: 2.2rem; margin: 15px 0; text-shadow: 0 0 10px rgba(255,71,87,0.3); }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 12px; border-left: 4px solid var(--red); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--red); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #222 !important; color: #555; cursor: not-allowed; }
        .label { color: var(--gray); font-size: 10px; text-transform: uppercase; font-weight: 800; display: block; margin-bottom: 2px; }
        .val { font-size: 15px; font-weight: 600; }
        .eye { float: right; cursor: pointer; background: #222; padding: 4px 10px; border-radius: 6px; font-size: 12px; border: 1px solid #333; }
        .eye.open { background: var(--green); border-color: var(--green); color: #000; }
        .other-player { background: #111; border: 1px solid #222; border-radius: 10px; padding: 12px; margin-bottom: 8px; position: relative; }
        .vote-btn { width: auto; padding: 5px 12px; font-size: 11px; float: right; margin: 0; background: transparent; border: 1px solid var(--red); color: var(--red); }
        .vote-count { position: absolute; right: 10px; top: 35px; color: var(--red); font-weight: bold; font-size: 12px; }
        .log-container { background: #000; border-radius: 8px; padding: 10px; margin-top: 15px; font-size: 11px; color: #666; height: 90px; overflow-y: auto; border: 1px solid #1a1a1a; }
        hr { border: 0; border-top: 1px solid #222; margin: 8px 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="scr_m" class="screen active">
        <h1>BUNKER</h1>
        <button onclick="sw('scr_h')">Создать сервер</button>
        <button style="background:var(--gray)" onclick="sw('scr_j')">Присоединиться</button>
    </div>

    <div id="scr_h" class="screen">
        <h2>Настройки</h2>
        <input type="text" id="h_room" placeholder="ID Комнаты (напр. ALPHA)">
        <button onclick="initRoom()">Создать и войти</button>
    </div>

    <div id="scr_j" class="screen">
        <h2>Вход в игру</h2>
        <input type="text" id="j_room" placeholder="ID Комнаты">
        <input type="text" id="j_name" placeholder="Твое имя">
        <button onclick="joinGame()">Подключиться</button>
    </div>

    <div id="scr_g" class="screen">
        <div id="roomHeader" style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span id="roomInfo" style="color:var(--gray); font-size:10px;"></span>
            <button id="startBtn" onclick="startGame()" style="width:auto; padding:5px 15px; margin:0; font-size:10px; display:none;">НАЧАТЬ ИГРУ</button>
        </div>
        
        <div id="my_char_ui"></div>

        <h3 style="color:var(--gray); font-size:11px; margin-top:20px;">СПИСОК ВЫЖИВАЮЩИХ:</h3>
        <div id="players_list"></div>

        <div class="log-container" id="gameLog"></div>
        <button style="background:var(--gray); opacity:0.5" onclick="location.reload()">Покинуть</button>
    </div>
</div>

<script>
    const dbData = {
        d: ["Ядерная зима", "Глобальный потоп", "Зомби-вирус", "Восстание ИИ", "Грибковая инфекция", "Ледниковый период", "Вторжение пришельцев"],
        p: ["Хирург", "Инженер", "Агроном", "Повар", "Электрик", "Физик", "Спецназовец", "Психолог", "Программист", "Учитель"],
        h: ["Идеальное", "Астма", "Диабет", "Близорукость", "Бессонница", "Слабое сердце", "Панические атаки"],
        b: ["Аптечка", "Топор", "Рация", "Запас еды", "Фонарь", "Пистолет", "Семена", "Лодка"],
        t: ["Мастер на все руки", "Знает 5 языков", "Очень вынослив", "Лидер", "Меткий стрелок", "Стратег"],
        g: ["Мужчина", "Женщина"],
        r: ["Плоден", "Бесплоден", "Высокий шанс близнецов"],
        phob: ["Темнота", "Замкнутое пространство", "Пауки", "Высота", "Микробы"],
        hobby: ["Рисование", "Бокс", "Гитара", "Йога", "Садоводство", "Шахматы"],
        extra: ["Фото семьи", "Золотые часы", "Дневник", "Зажигалка", "Компас"],
        s: [
            "ГЛОБАЛЬНАЯ СМЕНА ПОЛА", "ИСЦЕЛЕНИЕ ВСЕХ", "НОВАЯ КАТАСТРОФА", 
            "ГИПНОЗ (БЕЗ ФОБИЙ)", "ПОЛНАЯ СТЕРИЛЬНОСТЬ", "ОБМЕН ПРОФЕССИЯМИ", 
            "ОБЫСК (МИНУС БАГАЖ)", "МАШИНА ВРЕМЕНИ (ВСЕМ 20 ЛЕТ)", "ВСПЫШКА МУТАЦИИ"
        ]
    };

    const firebaseConfig = { databaseURL: "https://bunker-bm-853f2-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let curRoom = "", myName = "", openedFields = {}, hasVoted = false, isHost = false;

    function sw(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function seeded(s) { var x = Math.sin(s) * 10000; return x - Math.floor(x); }

    function initRoom() {
        curRoom = document.getElementById('h_room').value.trim().toUpperCase();
        if(!curRoom) return alert("Введите ID");
        isHost = true;
        database.ref('rooms/' + curRoom).set({ log: ["Комната создана хостом"], started: false });
        myName = "HOST_" + Math.floor(Math.random()*100); // Хост тоже игрок
        joinGame(true);
    }

    function joinGame(asHost = false) {
        if(!asHost) {
            curRoom = document.getElementById('j_room').value.trim().toUpperCase();
            myName = document.getElementById('j_name').value.trim();
        }
        if(!curRoom || !myName) return;

        database.ref('rooms/' + curRoom).once('value', snap => {
            const room = snap.val();
            if(!room) return alert("Комнаты не существует");
            if(room.started && !asHost) return alert("Игра уже началась, вход закрыт!");

            let seed = 0; for(let i=0; i<(curRoom+myName).length; i++) seed += (curRoom+myName).charCodeAt(i);
            
            // --- УНИКАЛЬНЫЕ КАРТОЧКИ БЕЗ ПОВТОРОВ ---
            let cards = [...dbData.s];
            let c1_idx = Math.floor(seeded(seed + 8) * cards.length);
            let c1 = cards.splice(c1_idx, 1)[0]; // Удаляем первую из копии
            let c2_idx = Math.floor(seeded(seed + 9) * cards.length);
            let c2 = cards[c2_idx];

            const char = {
                d: dbData.d[Math.floor(seeded(seed) * dbData.d.length)],
                p: dbData.p[Math.floor(seeded(seed+1) * dbData.p.length)],
                h: dbData.h[Math.floor(seeded(seed+2) * dbData.h.length)],
                b: dbData.b[Math.floor(seeded(seed+3) * dbData.b.length)],
                t: dbData.t[Math.floor(seeded(seed+4) * dbData.t.length)],
                g: dbData.g[Math.floor(seeded(seed+5) * dbData.g.length)],
                age: Math.floor(seeded(seed+6) * 45) + 18,
                rep: dbData.r[Math.floor(seeded(seed+7) * dbData.r.length)],
                phob: dbData.phob[Math.floor(seeded(seed+10) * dbData.phob.length)],
                s1: c1, s2: c2, votes: 0
            };

            database.ref('rooms/' + curRoom + '/users/' + myName).set({ char, public: { name: myName } });
            if(isHost) document.getElementById('startBtn').style.display = 'block';
            
            setupListeners();
            sw('scr_g');
        });
    }

    function startGame() {
        database.ref('rooms/' + curRoom + '/started').set(true);
        database.ref('rooms/' + curRoom + '/log').once('value', s => {
            let l = s.val() || []; l.push("🚀 ХОСТ ЗАКРЫЛ ВХОД. ИГРА НАЧАЛАСЬ!");
            database.ref('rooms/' + curRoom + '/log').set(l);
        });
        document.getElementById('startBtn').style.display = 'none';
    }

    function setupListeners() {
        database.ref('rooms/' + curRoom + '/users/' + myName + '/char').on('value', snap => {
            if(snap.val()) renderMyChar(snap.val());
        });

        database.ref('rooms/' + curRoom + '/users').on('value', snap => {
            const users = snap.val();
            const listEl = document.getElementById('players_list');
            listEl.innerHTML = "";
            for(let u in users) {
                const pub = users[u].public || {};
                const char = users[u].char || {};
                const isMe = (u === myName);
                listEl.innerHTML += `
                    <div class="other-player" style="${isMe ? 'border-color:var(--gray)' : ''}">
                        ${!isMe ? `<button class="vote-btn" onclick="voteFor('${u}')">Голосовать</button>` : ''}
                        <b>${u} ${isMe ? '(ВЫ)' : ''}</b><br>
                        <span style="font-size:11px; color:#aaa">
                            ${pub.p ? '🛠️ ' + pub.p + ' | ' : ''} ${pub.h ? '🏥 ' + pub.h + ' | ' : ''}
                            ${pub.g ? '👤 ' + pub.g + ' | ' : ''} ${pub.phob ? '😱 ' + pub.phob : ''}
                        </span>
                        <div class="vote-count">Голосов: ${char.votes || 0}</div>
                    </div>`;
            }
        });

        database.ref('rooms/' + curRoom + '/log').on('value', snap => {
            const logs = snap.val() || [];
            document.getElementById('gameLog').innerHTML = logs.slice().reverse().map(l => `<div>${l}</div>`).join('');
        });
    }

    function voteFor(target) {
        if(hasVoted) return alert("Вы уже голосовали в этом раунде!");
        database.ref(`rooms/${curRoom}/users/${target}/char/votes`).transaction(c => (c || 0) + 1);
        hasVoted = true;
        alert("Голос принят анонимно.");
    }

    function togglePublic(field, value, label) {
        if(openedFields[field]) return;
        openedFields[field] = true;
        database.ref(`rooms/${curRoom}/users/${myName}/public/${field}`).set(value);
        database.ref(`rooms/${curRoom}/log`).once('value').then(s => {
            let logs = s.val() || [];
            logs.push(`👁️ ${myName} вскрыл характеристику: ${label}`);
            database.ref(`rooms/${curRoom}/log`).set(logs);
        });
    }

    function renderMyChar(char) {
        document.getElementById('roomInfo').innerText = `ID: ${curRoom} | ${myName}`;
        const fields = [
            {id: 'p', l: 'Профессия', v: char.p},
            {id: 'h', l: 'Здоровье', v: char.h},
            {id: 'phob', l: 'Фобия', v: char.phob},
            {id: 'g', l: 'Биология', v: char.g + ', ' + char.age + ' лет'}
        ];

        let html = `<div class="card" style="border-color:var(--gold)"><span class="label">КАТАСТРОФА</span><span class="val">${char.d}</span></div>`;
        fields.forEach(f => {
            html += `<div class="card" style="padding:10px 15px; margin-bottom:5px;">
                <span class="eye ${openedFields[f.id]?'open':''}" onclick="togglePublic('${f.id}','${f.v}','${f.l}')">${openedFields[f.id]?'OK':'ОТКРЫТЬ'}</span>
                <span class="label">${f.l}</span><span class="val">${f.v}</span>
            </div>`;
        });
        html += `<div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
            <button onclick="useCard('${char.s1}','s1')" style="font-size:9px; background:var(--green)">${char.s1}</button>
            <button onclick="useCard('${char.s2}','s2')" style="font-size:9px; background:var(--green)">${char.s2}</button>
        </div>`;
        document.getElementById('my_char_ui').innerHTML = html;
    }

    function useCard(card, slot) {
        if(!confirm("Разыграть на ВСЕХ?")) return;
        database.ref(`rooms/${curRoom}/log`).once('value', s => {
            let l = s.val() || []; l.push(`🧨 ${myName} ПРИМЕНИЛ: ${card}`);
            database.ref(`rooms/${curRoom}/log`).set(l);
        });
        // Здесь можно дописать саму логику изменений как в v4.4
    }
</script>
</body>
</html>
