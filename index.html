<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bunker Online Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --red: #ff4757; --dark: #0f0f12; --card: #1c1c1f; --green: #2ecc71; --gray: #57606f; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--dark); color: #fff; margin: 0; padding: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .active { display: block; }
        h1 { color: var(--red); text-align: center; font-size: 2.5rem; font-weight: 900; margin: 20px 0; letter-spacing: -1px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border-left: 5px solid var(--red); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 18px; background: var(--red); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 14px; text-transform: uppercase; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:disabled { background: #333 !important; color: #777; cursor: not-allowed; }
        .label { color: var(--gray); font-size: 10px; text-transform: uppercase; font-weight: 800; margin-bottom: 5px; display: block; }
        .val { font-size: 16px; font-weight: 600; display: block; margin-bottom: 8px; line-height: 1.3; }
        .log-container { background: #000; border-radius: 15px; padding: 15px; margin-top: 20px; border: 1px solid #222; }
        #gameLog { height: 120px; overflow-y: auto; font-size: 13px; color: #888; }
        .log-entry { border-bottom: 1px solid #111; padding: 5px 0; border-left: 2px solid var(--red); padding-left: 8px; margin-bottom: 4px; }
        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 8px 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div id="scr_m" class="screen active">
        <h1>BUNKER</h1>
        <button onclick="sw('scr_h')">Создать комнату</button>
        <button style="background:var(--gray)" onclick="sw('scr_j')">Присоединиться</button>
    </div>

    <div id="scr_h" class="screen">
        <h2>Новая игра</h2>
        <input type="text" id="h_room" placeholder="Название (напр. PRO)">
        <button onclick="initRoom()">Запустить сервер</button>
    </div>

    <div id="scr_j" class="screen">
        <h2>Вход</h2>
        <input type="text" id="j_room" placeholder="Название комнаты">
        <input type="text" id="j_name" placeholder="Твоё имя">
        <button onclick="joinGame()">Войти</button>
    </div>

    <div id="scr_g" class="screen">
        <div id="roomTitle" style="color:var(--gray); font-size:11px; margin-bottom:10px;"></div>
        <div id="p_content"></div>
        <div class="log-container">
            <div id="gameLog"></div>
        </div>
        <button style="background:var(--green); margin-top:20px;" onclick="tgl()">Скрыть / Показать досье</button>
        <button style="background:var(--gray)" onclick="location.reload()">Выйти</button>
    </div>
</div>

<script>
    const dbData = {
        d: ["Ядерная зима", "Глобальный потоп", "Зомби-вирус", "Восстание ИИ", "Грибковая инфекция", "Вторжение пришельцев", "Биологическая атака"],
        p: ["Хирург", "Инженер", "Агроном", "Повар", "Электрик", "Физик", "Спецназовец", "Программист", "Учитель", "Пилот", "Ветеринар", "Строитель", "Священник", "Охотник", "Биолог"],
        h: ["Идеальное", "Астма", "Диабет", "Близорукость", "Бессонница", "Слабое сердце", "Аллергия", "Панические атаки", "Хронический кашель", "Шизофрения"],
        b: ["Аптечка", "Топор", "Рация", "Запас еды", "Набор отмычек", "Фонарь", "Пистолет", "Семена", "Очиститель воды", "Бронежилет"],
        t: ["Мастер на все руки", "Знает 5 языков", "Очень вынослив", "Лидер", "Меткий стрелок", "Стратег", "Не чувствует боли", "Удачлив"],
        g: ["Мужчина", "Женщина"],
        r: ["Плоден", "Бесплоден", "Высокий шанс близнецов", "Наследственные болезни"],
        // НОВЫЕ ХАРАКТЕРИСТИКИ
        phob: ["Темнота", "Замкнутое пространство", "Пауки", "Высота", "Одиночество", "Кровь", "Микробы", "Громкие звуки"],
        hobby: ["Рисование", "Бокс", "Игра на гитаре", "Йога", "Садоводство", "Шахматы", "Шитье", "Кулинария"],
        extra: ["Фотография семьи", "Золотые часы", "Дневник", "Зажигалка", "Компас", "Свисток", "Медальон", "Лупа"],
        
        s: [
            "ГЛОБАЛЬНАЯ СМЕНА ПОЛА (меняет пол всем)", 
            "ВТОРОЙ ШАНС (все болезни исцелены у всех)", 
            "НОВАЯ УГРОЗА (меняет тип катастрофы)", 
            "ГИПНОЗ (у всех меняется фобия на 'Нет фобий')",
            "ПРОФЕССИОНАЛЬНЫЙ СЛЁТ (у всех меняется хобби)",
            "ОБЫСК (у всех исчезает доп. инвентарь)",
            "ВСПЫШКА МУТАЦИИ (у всех меняется черта личности)"
        ]
    };

    const firebaseConfig = { databaseURL: "https://bunker-bm-853f2-default-rtdb.europe-west1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let curRoom = "", myName = "", usedCards = {s1: false, s2: false};

    function sw(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function seeded(s) { var x = Math.sin(s) * 10000; return x - Math.floor(x); }

    function initRoom() {
        curRoom = document.getElementById('h_room').value.trim().toUpperCase();
        if(!curRoom) return;
        database.ref('rooms/' + curRoom).set({ log: ["Игра создана"], time: Date.now() });
        sw('scr_m');
    }

    function joinGame() {
        curRoom = document.getElementById('j_room').value.trim().toUpperCase();
        myName = document.getElementById('j_name').value.trim();
        if(!curRoom || !myName) return;

        let baseSeed = 0; for(let i=0; i<curRoom.length+myName.length; i++) baseSeed += (curRoom+myName).charCodeAt(i);
        
        let c1 = Math.floor(seeded(baseSeed + 8) * dbData.s.length);
        let c2 = (c1 + 1 + Math.floor(seeded(baseSeed + 9) * (dbData.s.length-1))) % dbData.s.length;

        const myChar = {
            d: dbData.d[Math.floor(seeded(baseSeed) * dbData.d.length)],
            p: dbData.p[Math.floor(seeded(baseSeed+1) * dbData.p.length)],
            h: dbData.h[Math.floor(seeded(baseSeed+2) * dbData.h.length)],
            b: dbData.b[Math.floor(seeded(baseSeed+3) * dbData.b.length)],
            t: dbData.t[Math.floor(seeded(baseSeed+4) * dbData.t.length)],
            g: dbData.g[Math.floor(seeded(baseSeed+5) * dbData.g.length)],
            age: Math.floor(seeded(baseSeed+6) * 45) + 18,
            rep: dbData.r[Math.floor(seeded(baseSeed+7) * dbData.r.length)],
            // Инициализация новых полей
            phob: dbData.phob[Math.floor(seeded(baseSeed+10) * dbData.phob.length)],
            hobby: dbData.hobby[Math.floor(seeded(baseSeed+11) * dbData.hobby.length)],
            extra: dbData.extra[Math.floor(seeded(baseSeed+12) * dbData.extra.length)],
            s1: dbData.s[c1],
            s2: dbData.s[c2]
        };

        database.ref('rooms/' + curRoom + '/users/' + myName).update({ char: myChar });
        database.ref('rooms/' + curRoom + '/users/' + myName + '/char').on('value', (snap) => {
            const char = snap.val(); if(char) renderChar(char);
        });
        database.ref('rooms/' + curRoom + '/log').on('value', (snap) => {
            const list = snap.val() || [];
            document.getElementById('gameLog').innerHTML = list.slice().reverse().map(t => `<div class="log-entry">${t}</div>`).join('');
        });
        sw('scr_g');
    }

    function renderChar(char) {
        document.getElementById('roomTitle').innerText = `КОМНАТА: ${curRoom} | ИГРОК: ${myName}`;
        document.getElementById('p_content').innerHTML = `
            <div class="card" style="border-color:#f1c40f"><span class="label">Катастрофа</span><span class="val">${char.d}</span></div>
            <div class="card">
                <span class="label">Биология</span><span class="val">${char.g}, ${char.age} лет, ${char.rep}</span><hr>
                <span class="label">Здоровье и Фобия</span><span class="val">${char.h} | Страх: ${char.phob}</span><hr>
                <span class="label">Профессия и Хобби</span><span class="val">${char.p} (Хобби: ${char.hobby})</span><hr>
                <span class="label">Инвентарь</span><span class="val">${char.b} и ${char.extra}</span><hr>
                <span class="label">Черта</span><span class="val">${char.t}</span>
            </div>
            <div class="card" style="border-color:var(--green)">
                <span class="label">Спец. карты</span>
                <button id="b1" ${usedCards.s1?'disabled':''} onclick="sendGlobalAction('${char.s1}', 's1')">${usedCards.s1?'ИСПОЛЬЗОВАНО':char.s1}</button>
                <button id="b2" ${usedCards.s2?'disabled':''} onclick="sendGlobalAction('${char.s2}', 's2')">${usedCards.s2?'ИСПОЛЬЗОВАНО':char.s2}</button>
            </div>`;
    }

    function sendGlobalAction(card, slot) {
        if(!confirm(`Активировать: ${card}?`)) return;
        usedCards[slot] = true;

        database.ref('rooms/' + curRoom + '/users').once('value').then(snap => {
            const users = snap.val();
            const text = card.toLowerCase();
            const newD = dbData.d[Math.floor(Math.random() * dbData.d.length)];

            for (let user in users) {
                let char = users[user].char;
                if (text.includes("пол")) char.g = (char.g === "Мужчина" ? "Женщина" : "Мужчина");
                else if (text.includes("шанс")) char.h = "Идеальное";
                else if (text.includes("угроза")) char.d = newD;
                else if (text.includes("гипноз")) char.phob = "Нет фобий";
                else if (text.includes("слё")) char.hobby = dbData.hobby[Math.floor(Math.random() * dbData.hobby.length)];
                else if (text.includes("обыск")) char.extra = "Конфисковано";
                else if (text.includes("мутаци")) char.t = dbData.t[Math.floor(Math.random() * dbData.t.length)];

                database.ref('rooms/' + curRoom + '/users/' + user + '/char').set(char);
            }
        });

        const logRef = database.ref('rooms/' + curRoom + '/log');
        logRef.once('value').then(s => {
            let logs = s.val() || [];
            logs.push(`⭐ ${myName}: ${card}`);
            logRef.set(logs);
        });
    }

    function tgl() {
        const c = document.getElementById('p_content');
        c.style.display = (c.style.display === 'none') ? 'block' : 'none';
    }
</script>
</body>
</html>
